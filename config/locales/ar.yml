      flexible: { title_ar: "مرن", title_en: "Flexible", body: "الحياة تتغيّر. نعدّل التسلسل وفق جدولك واستجابة بشرتك." }
      locked:   { title_ar: "ثابت", title_en: "Locked", body: "لا تجارب في الأسابيع الأخيرة. ما قبل يومك هادئٌ بالتصميم." }
    quotes:
