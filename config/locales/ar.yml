  treatments_page:
    eyebrow: "العلاجات حسب النتيجة"
    title: "نعالج النتائج، لا الأجهزة."
    sub: "يصل معظم الناس بحثًا عن اسم جهاز. نحن نجيب بالنتيجة التي تريدينها فعلًا — ثم نوجّهك إلى البروتوكول الذي يملكها."
    owns_label: "يملكه"
    outcomes:
      - { o: "بشرة متعبة وباهتة", how: "إصلاح الحاجز، وتقشير لطيف، وعمل إشراق مُقاس — متسلسل عبر أسابيع، لا في جلسة واحدة.", owns: "إشراقة ٩٠ يومًا", view: "90-day-glow-reset", maysa: "«البشرة المتعبة غالبًا بشرة عُولجت أكثر من اللازم. نفعل أقل، فتفعل هي أكثر.»" }
      - { o: "تساقط الشعر وكثافته", how: "تشخيص فروة الرأس، وعمل تجديدي للفروة، وخطة كثافة مُتابَعة لتساقط ما بعد الولادة والإجهاد.", owns: "تاج التجدد", view: "reset-crown", maysa: "«الشعر صبور. نقيس بالمواسم، لا بالأسابيع.»" }
      - { o: "نحت الجسم والقوام", how: "نحت وعمل قوة يُقاسان مقابل الوظيفة — كيف تتحركين، لا كيف تبدين فقط.", owns: "نحت ٨ أسابيع", view: "8-week-sculpt", maysa: "«الرشاقة أثرٌ جانبي للقوة. نبني الثانية لنحصل على الأولى.»" }
      - { o: "الخطوط والامتلاء", how: "حقن متحفّظة ومحفّزات حيوية، مُخطّطة بحيث لا يبدو شيء مصطنعًا — بل مرتاحًا فقط.", owns: "منهج ميساء™", view: "maysa-method", maysa: "«إن لاحظ أحد، فقد بالغنا. الهدف هو الهدوء.»" }
      - { o: "الأجهزة المتقدّمة", how: "إمفيس، وإمسكلبت نيو، والليزر، والإكسوزومات — تُختار حسب النتيجة، لا حسب الأحدث.", owns: "منهج ميساء™", view: "maysa-method", maysa: "«الجهاز أداة، لا خطة. الخطة أولًا.»" }
  legal:
    eyebrow: "القانونية والامتثال"

    last_updated: "آخر تحديث: قيد النشر"
    draft_notice_ar: "هذه مسودّة. تخضع هذه السياسات لمراجعة مستشار قانوني سعودي قبل النشر."
    draft_notice_en: "This is a draft. These policies are subject to review by a Saudi legal advisor before publication."
    contact_ar: "لأي سؤال يتعلّق بهذه السياسات، تواصلي معنا عبر care@neuskin.me."
    contact_en: "For any question about these policies, contact us at care@neuskin.me."
    privacy:
      title_ar: "الخصوصية ونظام حماية البيانات"
      title_en: "Privacy & PDPL"
      sections:
        - { heading_ar: "ما نجمعه", heading_en: "What we collect",
            body_ar: "نجمع فقط ما تشاركينه معنا عبر الاستفسار أو الطلب: الاسم، رقم الجوال، البريد الإلكتروني، وأي ملاحظة تكتبينها. لا نجمع بيانات صحّية إلا ضمن رعايتك السريرية وبموافقتك.",
            body_en: "We collect only what you share through an inquiry or application: your name, mobile, email, and any note you write. We collect health data only within your clinical care and with your consent." }
        - { heading_ar: "كيف نستخدمه", heading_en: "How we use it",
            body_ar: "نستخدم بياناتك للردّ على استفسارك، وتنسيق رعايتك، والتواصل معك بشأن خطتك. لا نبيع بياناتك ولا نشاركها مع أطراف خارجية لأغراض تسويقية.",
            body_en: "We use your data to respond to your inquiry, coordinate your care, and contact you about your plan. We do not sell your data or share it with third parties for marketing." }
        - { heading_ar: "حقوقك بموجب نظام حماية البيانات الشخصية", heading_en: "Your rights under the PDPL",
            body_ar: "وفقًا لنظام حماية البيانات الشخصية في المملكة، لكِ الحق في الاطّلاع على بياناتك، وتصحيحها، وطلب حذفها، وسحب موافقتك في أي وقت. لتفعيل أيٍّ من هذه الحقوق، تواصلي معنا.",
            body_en: "Under the Kingdom's Personal Data Protection Law, you have the right to access your data, correct it, request its deletion, and withdraw your consent at any time. To exercise any of these rights, contact us." }
        - { heading_ar: "الاحتفاظ والأمان", heading_en: "Retention & security",
            body_ar: "نحتفظ ببياناتك للمدّة اللازمة لرعايتك وللالتزامات النظامية، ثم نحذفها. نحمي بياناتك بإجراءات تقنية وتنظيمية مناسبة، ولا يطّلع عليها إلا من يحتاجها لرعايتك.",
            body_en: "We keep your data for as long as needed for your care and regulatory obligations, then delete it. We protect it with appropriate technical and organisational measures, and only those who need it for your care may access it." }
    medical_disclaimer:
      title_ar: "إخلاء المسؤولية الطبية"
      title_en: "Medical Disclaimer"
      sections:
        - { heading_ar: "النتائج تختلف", heading_en: "Results vary",
            body_ar: "النتائج تختلف من شخص لآخر، وتعتمد على عوامل فردية. لا نقدّم أي ضمان لنتيجة محدّدة. جميع العلاجات تخضع لاستشارة طبية وتقييم فردي.",
            body_en: "Results vary from person to person and depend on individual factors. We make no guarantee of a specific outcome. All treatments are subject to medical consultation and individual assessment." }
        - { heading_ar: "ليس نصيحة طبية", heading_en: "Not medical advice",
            body_ar: "المحتوى على هذا الموقع لأغراض تعريفية عامة، وليس بديلًا عن استشارة طبية شخصية. أي قرار علاجي يُتّخذ بعد تقييم سريري مباشر.",
            body_en: "Content on this site is for general information and is not a substitute for personal medical advice. Any treatment decision is made after a direct clinical assessment." }
        - { heading_ar: "الإعلان الطبي", heading_en: "Medical advertising",
            body_ar: "يلتزم هذا الموقع بأنظمة الإعلان الطبي في المملكة. لا نعرض ادّعاءات غير مثبتة، ولا صورًا دون موافقة، ولا أسعارًا علنية للإجراءات الطبية.",
            body_en: "This site complies with the Kingdom's medical advertising regulations. We display no unproven claims, no images without consent, and no public pricing for medical procedures." }
    terms:
      title_ar: "شروط الاستفسار"
      title_en: "Inquiry Terms"
      sections:
        - { heading_ar: "استخدام الموقع", heading_en: "Using the site",
            body_ar: "باستخدامك هذا الموقع، توافقين على هذه الشروط. المحتوى مملوك لنيو سكين ولا يجوز إعادة نشره دون إذن.",
            body_en: "By using this site, you agree to these terms. Content is owned by NeuSkin and may not be republished without permission." }
        - { heading_ar: "الاستفسارات والمواعيد", heading_en: "Inquiries & appointments",
            body_ar: "إرسال استفسار لا يُنشئ علاقة علاجية ولا يضمن موعدًا. تبدأ الرعاية بعد التقييم الأول وقبول الخطة.",
            body_en: "Sending an inquiry does not create a treatment relationship or guarantee an appointment. Care begins after the first assessment and acceptance of a plan." }
        - { heading_ar: "التواصل عبر واتساب", heading_en: "WhatsApp communication",
            body_ar: "حين تتواصلين معنا عبر واتساب، تنطبق شروط واتساب وسياسة خصوصيته إضافةً إلى سياستنا. نتعامل مع محادثاتك بسرّية.",
            body_en: "When you contact us via WhatsApp, WhatsApp's own terms and privacy policy apply in addition to ours. We treat your conversations as confidential." }
    cookies:
      title_ar: "نستخدم ملفات تعريف الارتباط الأساسية لتشغيل الموقع، وملفات اختيارية لفهم الاستخدام."
      title_en: "We use essential cookies to run the site, and optional ones to understand usage."
