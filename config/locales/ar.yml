    eyebrow: "الفريق الطبي"

    title_ar: "أيدٍ قليلة، مدرَّبة جيدًا."
    title_en: "Few hands, well-trained."
    intro_ar: "تقود د. ميساء كل خطة، وينفّذها فريق صغير مختار — كل عضو بترخيصه ومجال تركيزه."
    intro_en: "Dr. Maysa leads every plan; a small, chosen team carries it out — each with their own licence and focus."
    focus_label: "التركيز"

    members:
      - { name_ar: "د. ميساء", name_en: "Dr. Maysa", title_ar: "المؤسِّسة · استشارية الجلدية", title_en: "Founder · Consultant Dermatologist", certs: "استشارية أمراض جلدية · زمالة في الطب التجميلي والتجديدي", focus: "التشخيص، منهج ميساء، تجديد البشرة.", bio: "أسّست د. ميساء نيو سكين لتعامل البشرة كنظامٍ يُقرأ قبل أن يُعالَج. تُجري كل تقييم أول بنفسها، وتكتب خطة الاثني عشر شهرًا التي تحتفظ بها كل مريضة." }
      - { name_ar: "د. ليان [مؤقّت]", name_en: "Dr. Layan [placeholder]", title_ar: "طبيبة جلدية", title_en: "Dermatologist", certs: "دكتوراه في الطب · البورد السعودي للجلدية", focus: "التصبّغ، حبّ الشباب، ترميم الحاجز.", bio: "نص مؤقّت. تعمل د. ليان إلى جانب د. ميساء على بروتوكولات البشرة، مع تركيز خاص على التصبّغ وصحّة الحاجز. يُؤكَّد الاسم والصورة والسيرة قبل الإطلاق." }
      - { name_ar: "نورة [مؤقّت]", name_en: "Noura [placeholder]", title_ar: "أخصائية تجميل", title_en: "Aesthetic Practitioner", certs: "أخصائية تجميل مرخّصة", focus: "الأجهزة، العناية بالوجه، بروتوكولات الجسم.", bio: "نص مؤقّت. تنفّذ نورة بروتوكولات الأجهزة والجسم تحت إشراف طبي. يُؤكَّد الاسم والصورة والسيرة قبل الإطلاق." }
      - { name_ar: "سارة [مؤقّت]", name_en: "Sara [placeholder]", title_ar: "أخصائية تجميل", title_en: "Aesthetic Practitioner", certs: "أخصائية تجميل مرخّصة", focus: "الشعر وفروة الرأس، دعم الحقن.", bio: "نص مؤقّت. تركّز سارة على بروتوكولات الشعر وفروة الرأس وتدعم جلسات الحقن. يُؤكَّد الاسم والصورة والسيرة قبل الإطلاق." }
      - { name_ar: "ريم [مؤقّت]", name_en: "Reem [placeholder]", title_ar: "مسؤولة علاقات المريضات", title_en: "Patient Relations Lead", certs: "علاقات المريضات", focus: "نقطة تواصلك الأولى، المواعيد، السرية.", bio: "نص مؤقّت. تراجع ريم كل استفسار، وتنسّق المواعيد، وهي الخيط الهادئ الذي يُبقي تجربة كل مريضة خاصة وغير مستعجلة. يُؤكَّد الاسم والصورة." }
    cta_label: "ابدئي"

    cta_ar: "ابدئي محادثة هادئة."
    cta_en: "Begin a quiet conversation."
