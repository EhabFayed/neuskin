      - { ar: "لم أُجرِ أي شيء جديد في الأسبوع الأخير، وهذا أراحني كثيرًا.", en: "Nothing new in the final week — that alone put me at ease.", by: "H.F. · Bride's 180 · 2025" }
      - { ar: "بدت بشرتي كأنها أنا، في أفضل حالاتها.", en: "My skin looked like me — at my best.", by: "S.A. · Bride's 180 · 2024" }
