    family_ar: "كثيرًا ما تبدأ الرحلة بسؤال من الأم أو الأخت. نرحّب بكنّ في التخطيط — بالخصوصية ذاتها."
    family_en: "Often the journey begins with a question from a mother or sister. You're welcome in the planning — with the same discretion."
