      plan:     { title_ar: "الخطة المكتوبة", title_en: "The written plan", body: "خطة لاثني عشر شهرًا تشمل البشرة والشعر والجسم ونمط الحياة. لكِ أن تحتفظي بها." }
      review:   { title_ar: "المراجعة", title_en: "Quarterly review", body: "نقيس ثم نعدّل — لتستجيب الخطة لبشرتك، لا العكس." }
