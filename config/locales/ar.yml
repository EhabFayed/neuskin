    founder_body: "أسّست نيو سكين لأنني سئمت القوائم. الوجه ليس قائمة خدمات. قبل أن أعالج أي شيء، أقرأه — بشرةً وشعرًا وجسمًا ونمط حياة — وأكتب لكِ خطة تحتفظين بها. الخطة هي العمل، وما بعدها صبر."
