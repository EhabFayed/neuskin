    windows:
      ample: "لديك متّسع من الوقت. يمكننا تخطيط عروس ١٨٠ كاملةً بلا استعجال."
      ideal: "النافذة المثالية. هذا تمامًا حين تؤتي عروس ١٨٠ أفضل ثمارها."
      soon: "الموعد قريب — لكننا نستطيع المساعدة. سنعطي الأولوية لما يهمّ قبل يومك."
      today: "لنتحدّث عن التوقيت. أرسلي لنا موعدك ونخطّط من حيث أنت."
