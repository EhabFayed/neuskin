    eyebrow: "المجلّة"

    title_ar: "ملاحظات من عيادة بإشراف طبي."
    title_en: "Notes from a doctor-led clinic."
    intro_ar: "لا وسوم رائجة. لا مسابقة شعبية. لكل مقال صلاحية دائمة."
    intro_en: "No trending labels. No popularity contest. Every piece has a permanent shelf life."
