      sent: "تفقّدي بريدك — قائمتك في طريقها إليك. (آلية الإرسال قيد الإعداد.)"
      success: "قائمتك في طريقها إليك."
    cta_label: "الدعوة"

    cta_ar: "اطلبي خطة عروس ١٨٠."
