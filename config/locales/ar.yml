    discretion_label: "عن السرية"

    discretion_ar: "ما يُقال في هذه العيادة، يبقى فيها. لا أسماء، لا صور، لا استثناءات دون موافقتك الصريحة. الخصوصية ليست خدمة نقدّمها — إنها شرطٌ نعمل به."
    discretion_en: "What is said in this clinic stays in it. No names, no images, no exceptions without your explicit consent. Privacy is not a service we offer — it is a condition we work under."
  method:
    brand_html: "منهج ميساء<span class=\"tm\">™</span>"
    eyebrow: "منهج ميساء"

    statement_ar: "البشرة بيانات. اقرأيها، ثم عالجيها."
    statement_en: "Skin is data. Read it, then treat it."
    principle_label: "المبدأ"

    principle:
      - "تبدأ معظم العيادات بعلاجٍ ثم تبحث عن وجهٍ تطبّقه عليه. منهج ميساء يبدأ بالعكس. يعامل البشرة كنظامٍ يمكن قراءته — يُقاس ويُرسَم ويُفهَم — قبل اتخاذ أي قرار."
      - "من تلك القراءة تأتي خطة، لا عملية بيع. المنهج ليس إجراءً تحجزينه؛ بل هو الانضباط الذي يقرّر أي الإجراءات يستحقّ الحجز، وبأي ترتيب، وعلى أي مدى. إنه الفرق بين نتيجة تبدو «مصنوعة» ونتيجة تبدو أنتِ."
    pillars_label: "الركائز الأربع"

    pillars_title_ar: "نظام واحد، أربع ركائز"
    pillars_title_en: "One system, four pillars"
    pillars:
      skin:      { title_ar: "البشرة", title_en: "Skin", body: "الملمس واللون والحاجز والتصبّغ — تُقرأ أولًا، لأنها تكشف كل ما عداها." }
      hair:      { title_ar: "الشعر", title_en: "Hair", body: "صحّة فروة الرأس والكثافة، تُعالَج كجزء من الكل، لا كأمرٍ ثانوي." }
      body:      { title_ar: "الجسم", title_en: "Body", body: "القوام والتحديد والاعتدال — لأن البشرة لا تنتهي عند خط الفك." }
      lifestyle: { title_ar: "نمط الحياة", title_en: "Lifestyle", body: "النوم والشمس والإجهاد والعادة — مدخلاتٌ لا يتجاوزها أي جهاز." }
    pillars_note_ar: "لا تُعالَج أيٌّ منها بمعزل عن الأخرى. هذا هو المنهج."
    pillars_note_en: "None is treated in isolation from the others. That is the method."
    not_label: "ما ليس عليه"

    not_items:
      - { ar: "ليس علاجًا واحدًا.", en: "It is not a single treatment." }
      - { ar: "ليس حلًّا سريعًا.", en: "It is not a quick fix." }
      - { ar: "ليس قائمة أسعار.", en: "It is not a price list." }
      - { ar: "ليس وعدًا بنتيجة قبل قراءة بشرتك.", en: "It is not a promise made before your skin is read." }
    timeline_label: "السنة"

    timeline_title_ar: "اثنا عشر شهرًا، مرسومة."
    timeline_title_en: "Twelve months, mapped."
    timeline:
      - { months: "الأشهر ١–٣", title_ar: "القراءة والتهيئة", title_en: "Read & prepare", body: "التشخيص، وترميم الحاجز، والخطة المكتوبة التي تحتفظين بها." }
      - { months: "الأشهر ٤–٦", title_ar: "التأسيس", title_en: "Build the base", body: "تبدأ البروتوكولات الأساسية، متسلسلةً كي لا تُرهَق البشرة." }
      - { months: "الأشهر ٧–٩", title_ar: "التحسين", title_en: "Refine", body: "نقيس مقابل خط الأساس ونعدّل ما تطلبه البيانات." }
      - { months: "الأشهر ١٠–١٢", title_ar: "الحفاظ", title_en: "Hold the result", body: "يستقرّ الحفاظ على النتيجة، وتصبح المراجعة الفصلية إيقاعًا هادئًا." }
    stories_label: "بأصواتهنّ"

    stories:
      - { ar: "للمرة الأولى فهمت لماذا نفعل كل خطوة، لا فقط ماذا نفعل.", en: "For the first time I understood why we did each step — not just what.", by: "A.M. · 2025" }
      - { ar: "الخطة المكتوبة جعلتني أثق. كنت أعرف دائمًا ما يأتي بعد.", en: "The written plan made me trust it. I always knew what came next.", by: "L.S. · 2025" }
      - { ar: "النتيجة لم تبدُ كأنني فعلت شيئًا — بدت كأنني أنا.", en: "The result didn't look like I'd done something — it looked like me.", by: "R.A. · 2024" }
    cta_label: "ابدئي"

