      - { months: "الشهر ١–٣", title_ar: "استعادة", title_en: "Restore", body: "عمل الحاجز والأساس — الجزء غير البرّاق والأساسي." }
      - { months: "الشهر ٤–٩", title_ar: "بناء", title_en: "Build", body: "علاج متسلسل نحو أهدافكِ الموثّقة." }
