    statement_ar: "البشرة بيانات. اقرئيها، ثم عالجيها."
    statement_en: "Skin is data. Read it, then treat it."
    principle_label: "المبدأ"

    principle:
      - "أغلب العيادات تبدأ بعلاجٍ ثم تبحث عن وجهٍ تستخدمه عليه. نحن نبدأ بالبشرة — تاريخها وسلوكها ونقطة بدايتها القابلة للقياس — ثم نقرّر ما الذي يستحق أن يُفعل، إن كان. منهج ميساء™ ليس خدمة، بل انضباط: اقرئي أولاً، عالجي ثانياً، وقيسي دائماً."
    pillars_label: "أربع ركائز، منظومةٌ واحدة"

    pillars_title_ar: "أربع ركائز، منظومةٌ واحدة"
