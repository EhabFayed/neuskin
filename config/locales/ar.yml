    portrait_alt: "صورة تحريرية للدكتورة ميساء"
    philosophy_ar: "«لا أعالج وجهًا. أقرأ بشرةً، ثم أخطّط لها.»"
    philosophy_en: "“I don't treat a face. I read skin — then I plan for it.”"
    credentials:
      - "استشارية أمراض جلدية"
      - "زمالة في الطب التجميلي والتجديدي"
      - "عضو الجمعية السعودية للأمراض الجلدية"
      - "خمسة عشر عامًا في الممارسة السريرية"
    essay_label: "كيف أفكّر في العلاج"

    essay:
      - "أسّست نيو سكين لأنني سئمت القوائم. كانت المريضة تأتي مشيرةً إلى علاج رأته على الإنترنت، تطلبه بالاسم. أتفهّم الدافع — لكنه مكان خاطئ للبدء. العلاج هو القرار الأخير، لا الأول."
      - { ar: "«قبل أن أقترح أي إجراء، أريد أن أعرف كيف ستبدو بشرتك بعد خمس سنوات.»", en: "“Before I suggest any procedure, I want to know what your skin will look like in five years.”" }
      - "لذا ابتكرت طريقة عمل مختلفة. تبدأ كل مريضة بتقييم — ستون دقيقة، دون أي علاج، قراءة فحسب. البشرة، الشعر، الجسم، وطريقة حياتك. منها أكتب خطة تمتدّ اثني عشر شهرًا، وأمنحها لكِ لتحتفظي بها. الخطة هي العمل. وما بعدها ترتيبٌ وصبر."
      - "أقول «لا» كثيرًا. لا للمريضة التي تريد ثلاثة إجراءات دفعة واحدة. لا للموضة التي ستشيخ بصورة سيئة. لا للنتيجة التي تبدو مبهرة في صورة وخاطئة في غرفة. قول «لا» ليس حجبًا للعناية — إنه العناية ذاتها."
      - { ar: "«النتيجة الجيدة لا تُلاحَظ. يُلاحَظ الشخص.»", en: "“A good result is not noticed. The person is noticed.”" }
      - "ما أصرّ عليه هو الاعتدال والقياس والخصوصية. نوثّق النتائج كل ثلاثة أشهر، فلا نخمّن أبدًا. نعالج بالتسلسل، فلا تُرهَق البشرة. ونُبقي كل شيء هادئًا — استشارتك وعلاجك ونتائجك لكِ وحدك."
      - { ar: "«الهدوء ليس أسلوبًا في التسويق. إنه طريقة في الطب.»", en: "“Quiet is not a marketing style. It is a way of practising medicine.”" }
    method_label: "المنهج"

