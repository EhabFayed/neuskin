        items:
          - { q_ar: "أين تقع العيادة وما ساعات العمل؟", q_en: "Where are you, and what are your hours?", a_ar: "نحن في حي الملقا بالرياض. نعمل من السبت إلى الخميس، ١٠:٠٠–٢٢:٠٠، والجمعة مغلق.", a_en: "We're in Al Malqa, Riyadh, open Saturday to Thursday, 10:00–22:00, closed Friday." }
          - { q_ar: "كيف أبدأ؟", q_en: "How do I begin?", a_ar: "برسالة واتساب خاصة أو نموذج الاستفسار. تراجعه مسؤولة علاقات المريضات وتعاودين التواصل خلال ساعتين في أوقات العمل.", a_en: "With a private WhatsApp message or the inquiry form. Our patient relations lead reviews it and replies within two hours during business hours." }
          - { q_ar: "من سيعالجني؟", q_en: "Who will treat me?", a_ar: "تقود د. ميساء كل خطة وتُجري التقييم الأول بنفسها. ينفّذ الجلسات فريق طبي مرخّص تحت إشرافها.", a_en: "Dr. Maysa leads every plan and conducts the first assessment personally. A licensed medical team carries out sessions under her supervision." }
          - { q_ar: "هل أحتاج موعدًا مسبقًا؟", q_en: "Do I need an appointment?", a_ar: "نعم، نعمل بالمواعيد فقط حفاظًا على الخصوصية والهدوء. لا زيارات دون ترتيب مسبق.", a_en: "Yes — we work by appointment only, to keep things private and unhurried. No walk-ins." }
          - { q_ar: "ماذا أتوقّع في زيارتي الأولى؟", q_en: "What should I expect on my first visit?", a_ar: "تقييم تشخيصي لمدة ٦٠ دقيقة، دون أي علاج. نقرأ بشرتك ونضع خطة مكتوبة تحتفظين بها.", a_en: "A 60-minute diagnostic assessment, with no treatment performed. We read your skin and write a plan you keep." }
      treatments:
        title_ar: "عن العلاجات"
        title_en: "About treatments"
        items:
          - { q_ar: "هل العلاجات مؤلمة؟", q_en: "Are treatments painful?", a_ar: "معظمها لطيف. حين يلزم، نستخدم مخدّرًا موضعيًا، ونشرح لك الإحساس المتوقّع قبل البدء.", a_en: "Most are gentle. Where needed, we use topical numbing and explain the sensation to expect before we begin." }
          - { q_ar: "كم تبلغ فترة التعافي؟", q_en: "How much downtime is there?", a_ar: "تختلف حسب الإجراء — من لا شيء إلى بضعة أيام. نخطّط الجلسات حول جدولك ونخبرك مسبقًا.", a_en: "It varies by procedure — from none to a few days. We sequence sessions around your schedule and tell you in advance." }
          - { q_ar: "متى أرى النتائج؟", q_en: "When will I see results?", a_ar: "بعض النتائج تظهر خلال أسابيع، وبعضها يحتاج دورة كاملة. نوثّق التقدّم كل ثلاثة أشهر لئلّا نخمّن.", a_en: "Some results show within weeks; others need a full cycle. We document progress quarterly so we're never guessing." }
          - { q_ar: "هل العلاجات آمنة؟", q_en: "Are the treatments safe?", a_ar: "نستخدم أجهزة ومنتجات مرخّصة فقط، وكل خطة تُبنى على تقييم طبي فردي. السلامة تسبق كل شيء.", a_en: "We use only licensed devices and products, and every plan is built on an individual medical assessment. Safety comes first." }
          - { q_ar: "كيف أعرف ما يناسبني؟", q_en: "How do I know what's right for me?", a_ar: "لا تختارين من قائمة. التقييم يحدّد ما تحتاجه بشرتك فعلًا، وأحيانًا يكون الجواب: انتظري.", a_en: "You don't choose from a menu. The assessment determines what your skin actually needs — and sometimes the answer is: wait." }
      protocols:
        title_ar: "عن البروتوكولات"
        title_en: "About protocols"
        items:
          - { q_ar: "كيف تعمل البروتوكولات؟", q_en: "How do protocols work?", a_ar: "كل بروتوكول خطة متسلسلة لمدّة محدّدة، لا إجراءً منفردًا. نعالج بالترتيب ونراجع كل ثلاثة أشهر.", a_en: "Each protocol is a sequenced plan over a set period, not a single procedure. We treat in order and review quarterly." }
          - { q_ar: "هل يمكنني تغيير البروتوكول؟", q_en: "Can I switch protocols?", a_ar: "نعم. تستجيب الخطة لبشرتك؛ إن تغيّرت احتياجاتك، نعدّلها مع د. ميساء.", a_en: "Yes. The plan responds to your skin; if your needs change, we adjust it with Dr. Maysa." }
          - { q_ar: "ماذا لو لم أرَ نتائج؟", q_en: "What if I don't see results?", a_ar: "لأننا نقيس كل ثلاثة أشهر، نلاحظ مبكرًا ونعدّل. النتائج موثّقة، لا موعودة.", a_en: "Because we measure quarterly, we notice early and adjust. Results are documented, not promised." }
          - { q_ar: "من يقرّر الخطة؟", q_en: "Who decides the plan?", a_ar: "د. ميساء، بناءً على تشخيصك ومع موافقتك. لا شيء يُجرى دون أن تفهميه وتختاريه.", a_en: "Dr. Maysa, based on your diagnosis and with your consent. Nothing happens without your understanding and choice." }
          - { q_ar: "هل أحتاج عضوية للبدء؟", q_en: "Do I need a membership to begin?", a_ar: "لا. يبدأ الجميع بتقييم منهج ميساء. العضوية للعناية المستمرة بعد إكمال بروتوكول.", a_en: "No. Everyone begins with the Maysa Method™ assessment. Membership is for ongoing maintenance after a protocol." }
      privacy:
        title_ar: "عن الخصوصية"
        title_en: "About privacy"
        items:
          - { q_ar: "هل بياناتي سرّية؟", q_en: "Is my information confidential?", a_ar: "تمامًا. لا يُطّلع على ملفّك إلا من يعالجك، ونلتزم بنظام حماية البيانات الشخصية.", a_en: "Completely. Only those treating you see your file, and we comply with the Personal Data Protection Law." }
          - { q_ar: "هل تلتقطون صورًا؟", q_en: "Do you take photographs?", a_ar: "فقط بموافقتك المكتوبة، وبإطار تصوير موحّد. لكِ أن ترفضي دون أن يؤثّر ذلك على علاجك.", a_en: "Only with your written consent, under a standardised framing. You may decline with no effect on your care." }
          - { q_ar: "هل تنشرون نتائجي على وسائل التواصل؟", q_en: "Will you post my results on social media?", a_ar: "أبدًا دون موافقة منفصلة وصريحة. الصمت هو الوضع الافتراضي، لا النشر.", a_en: "Never without separate, explicit consent. Silence is the default — not sharing." }
          - { q_ar: "هل يمكنني سحب موافقتي لاحقًا؟", q_en: "Can I withdraw my consent later?", a_ar: "في أي وقت. أبلغينا وسنوقف أي استخدام لصورك أو قصّتك فورًا.", a_en: "At any time. Tell us and we stop any use of your images or story immediately." }
          - { q_ar: "هل تتعاملون مع شخصيات عامة بسرية أكبر؟", q_en: "Do you offer extra discretion for public figures?", a_ar: "نعم، عبر مسار العناية الخاصة — خط مباشر، ساعات خاصة، واتفاقيات سرّية عند الحاجة.", a_en: "Yes, through Private Care — a direct line, private hours, and confidentiality agreements where needed." }
  clinic:
    hero_ar: "عيادة خاصة في الملقا، بُنيت حول سؤال واحد: كيف ستبدو بشرتك بعد خمس سنوات؟"
    hero_en: "A private clinic in Al Malqa, built around one question: what will your skin look like in five years?"
    story_label: "The story"

    story:
      - "We did not set out to open another aesthetics clinic. Riyadh has many. We set out to answer a question most clinics never ask: not what would you like done today, but where do you want your skin to be in five years?"
      - "NeuSkin began with that question and a conviction — that skin is not a series of fixes, but a system worth reading before it is treated. So we built a clinic around the reading. A doctor leads every plan. Nothing is sold from a menu. Outcomes are measured, not promised."
      - "We chose Al Malqa for its quiet. We kept the rooms few and the hours unhurried. We treat fewer patients, more carefully — because the work we believe in cannot be done at volume. This is a clinic for the woman who wants results that look like her, arrived at slowly, and kept private."
    space_label: "The space"

    space_rooms:
      - "The entrance · المدخل"
      - "Private waiting lounge · صالة الانتظار الخاصة"
      - "Consultation room · غرفة الاستشارة"
      - "Treatment room · غرفة العلاج"
      - "Device room · غرفة الأجهزة"
      - "The private suite · الجناح الخاص"
    standard_label: "The standard"

    standard:
      - { ar: "تعمل العيادة بترخيص الهيئة العامة للغذاء والدواء ووزارة الصحة، وأرقام التراخيص ظاهرة في تذييل كل صفحة.", en: "The clinic operates under SFDA and MOH licences, with licence numbers visible in the footer of every page." }
      - { ar: "يحمل كل ممارس ترخيصًا مهنيًا ساريًا ضمن مجال تخصّصه.", en: "Every practitioner holds a current professional licence within their scope of practice." }
      - { ar: "خصوصيتك محمية وفق نظام حماية البيانات الشخصية. لا يُطّلع على ملفّك إلا من يعالجك.", en: "Your privacy is protected under the Personal Data Protection Law. Only those treating you see your file." }
      - { ar: "لا نلتقط أي صورة دون موافقتك المكتوبة، وبإطار تصوير موحّد.", en: "We take no photograph without your written consent, under a standardised framing." }
      - { ar: "النتائج تختلف من شخص لآخر. هذا ليس بندًا قانونيًا — إنه صدقٌ نبدأ به كل خطة.", en: "Results vary from person to person. This isn't fine print — it's the honesty we begin every plan with." }
    cta_label: "The invitation"

    cta_ar: "ابدئي محادثة هادئة."
    cta_en: "Begin a quiet conversation."
    cta_note: "We reply Saturday to Thursday, 10:00–22:00."
