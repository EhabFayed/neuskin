  maysa:
    eyebrow: "Dr. Maysa · The Founder · المؤسِّسة"
    portrait_alt: "Editorial portrait of Dr. Maysa"
    philosophy_ar: "«لا أعالج وجهًا. أقرأ بشرةً، ثم أخطّط لها.»"
    philosophy_en: "“I don't treat a face. I read skin — then I plan for it.”"
    credentials:
      - "Board-Certified Dermatologist"
      - "Fellowship, Aesthetic & Regenerative Medicine"
      - "Member, Saudi Society of Dermatology"
      - "15 years in clinical practice"
    essay_label: "How I think about treatment · كيف أفكّر في العلاج"
    essay:
      - "I founded NeuSkin because I was tired of menus. A patient would arrive, point at a treatment she had seen online, and ask for it by name. I understood the instinct — but it is the wrong place to begin. The treatment is the last decision, not the first."
      - { ar: "«قبل أن أقترح أي إجراء، أريد أن أعرف كيف ستبدو بشرتك بعد خمس سنوات.»", en: "“Before I suggest any procedure, I want to know what your skin will look like in five years.”" }
      - "So I built a different way of working. Every patient begins with an assessment — sixty minutes, no treatment performed, just reading. Skin, hair, body, the way you live. From that I write a plan that spans twelve months, and I give it to you to keep. The plan is the work. Everything after it is sequencing and patience."
      - "I say no often. No to the patient who wants three procedures at once. No to the trend that will age badly. No to the result that looks impressive in a photograph and wrong in a room. Saying no is not withholding care — it is the care."
      - { ar: "«النتيجة الجيدة لا تُلاحَظ. يُلاحَظ الشخص.»", en: "“A good result is not noticed. The person is noticed.”" }
      - "What I insist on is restraint, measurement, and privacy. We document outcomes quarterly, so we are never guessing. We treat in sequence, so the skin is never overwhelmed. And we keep everything quiet — your consultation, your treatment, your results are yours alone."
      - { ar: "«الهدوء ليس أسلوبًا في التسويق. إنه طريقة في الطب.»", en: "“Quiet is not a marketing style. It is a way of practising medicine.”" }
    method_label: "The method · المنهج"
    method:
      diagnose: { title_ar: "التشخيص", title_en: "Diagnostic mapping", body: "A baseline reading of skin, hair and body — the data before any decision." }
      plan:     { title_ar: "الخطة المكتوبة", title_en: "The written plan", body: "A twelve-month roadmap across skin, hair, body and lifestyle. Yours to keep." }
      review:   { title_ar: "المراجعة", title_en: "Quarterly review", body: "We measure, then adjust — so the plan responds to your skin, not the other way round." }
    words_label: "In her words · بصوتها"
