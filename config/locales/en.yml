    eyebrow: "Legal & Compliance · القانونية والامتثال"
    last_updated: "Last updated: pending publication"
    draft_notice_ar: "هذه مسودّة. تخضع هذه السياسات لمراجعة مستشار قانوني سعودي قبل النشر."
    draft_notice_en: "This is a draft. These policies are subject to review by a Saudi legal advisor before publication."
    contact_ar: "لأي سؤال يتعلّق بهذه السياسات، تواصلي معنا عبر care@neuskin.me."
    contact_en: "For any question about these policies, contact us at care@neuskin.me."
    privacy:
      title_ar: "سياسة الخصوصية ونظام حماية البيانات"
      title_en: "Privacy Policy & PDPL"
      sections:
        - { heading_ar: "ما نجمعه", heading_en: "What we collect",
            body_ar: "نجمع فقط ما تشاركينه معنا عبر الاستفسار أو الطلب: الاسم، رقم الجوال، البريد الإلكتروني، وأي ملاحظة تكتبينها. لا نجمع بيانات صحّية إلا ضمن رعايتك السريرية وبموافقتك.",
            body_en: "We collect only what you share through an inquiry or application: your name, mobile, email, and any note you write. We collect health data only within your clinical care and with your consent." }
        - { heading_ar: "كيف نستخدمه", heading_en: "How we use it",
            body_ar: "نستخدم بياناتك للردّ على استفسارك، وتنسيق رعايتك، والتواصل معك بشأن خطتك. لا نبيع بياناتك ولا نشاركها مع أطراف خارجية لأغراض تسويقية.",
            body_en: "We use your data to respond to your inquiry, coordinate your care, and contact you about your plan. We do not sell your data or share it with third parties for marketing." }
        - { heading_ar: "حقوقك بموجب نظام حماية البيانات الشخصية", heading_en: "Your rights under the PDPL",
            body_ar: "وفقًا لنظام حماية البيانات الشخصية في المملكة، لكِ الحق في الاطّلاع على بياناتك، وتصحيحها، وطلب حذفها، وسحب موافقتك في أي وقت. لتفعيل أيٍّ من هذه الحقوق، تواصلي معنا.",
            body_en: "Under the Kingdom's Personal Data Protection Law, you have the right to access your data, correct it, request its deletion, and withdraw your consent at any time. To exercise any of these rights, contact us." }
        - { heading_ar: "الاحتفاظ والأمان", heading_en: "Retention & security",
            body_ar: "نحتفظ ببياناتك للمدّة اللازمة لرعايتك وللالتزامات النظامية، ثم نحذفها. نحمي بياناتك بإجراءات تقنية وتنظيمية مناسبة، ولا يطّلع عليها إلا من يحتاجها لرعايتك.",
            body_en: "We keep your data for as long as needed for your care and regulatory obligations, then delete it. We protect it with appropriate technical and organisational measures, and only those who need it for your care may access it." }
    medical_disclaimer:
      title_ar: "إخلاء المسؤولية الطبية"
      title_en: "Medical Advertising Disclaimer"
      sections:
        - { heading_ar: "النتائج تختلف", heading_en: "Results vary",
            body_ar: "النتائج تختلف من شخص لآخر، وتعتمد على عوامل فردية. لا نقدّم أي ضمان لنتيجة محدّدة. جميع العلاجات تخضع لاستشارة طبية وتقييم فردي.",
            body_en: "Results vary from person to person and depend on individual factors. We make no guarantee of a specific outcome. All treatments are subject to medical consultation and individual assessment." }
        - { heading_ar: "ليس نصيحة طبية", heading_en: "Not medical advice",
            body_ar: "المحتوى على هذا الموقع لأغراض تعريفية عامة، وليس بديلًا عن استشارة طبية شخصية. أي قرار علاجي يُتّخذ بعد تقييم سريري مباشر.",
            body_en: "Content on this site is for general information and is not a substitute for personal medical advice. Any treatment decision is made after a direct clinical assessment." }
        - { heading_ar: "الإعلان الطبي", heading_en: "Medical advertising",
            body_ar: "يلتزم هذا الموقع بأنظمة الإعلان الطبي في المملكة. لا نعرض ادّعاءات غير مثبتة، ولا صورًا دون موافقة، ولا أسعارًا علنية للإجراءات الطبية.",
            body_en: "This site complies with the Kingdom's medical advertising regulations. We display no unproven claims, no images without consent, and no public pricing for medical procedures." }
    terms:
      title_ar: "شروط الاستخدام والاستفسار"
      title_en: "Terms of Service & Inquiry"
      sections:
        - { heading_ar: "استخدام الموقع", heading_en: "Using the site",
            body_ar: "باستخدامك هذا الموقع، توافقين على هذه الشروط. المحتوى مملوك لنيو سكين ولا يجوز إعادة نشره دون إذن.",
            body_en: "By using this site, you agree to these terms. Content is owned by NeuSkin and may not be republished without permission." }
        - { heading_ar: "الاستفسارات والمواعيد", heading_en: "Inquiries & appointments",
            body_ar: "إرسال استفسار لا يُنشئ علاقة علاجية ولا يضمن موعدًا. تبدأ الرعاية بعد التقييم الأول وقبول الخطة.",
            body_en: "Sending an inquiry does not create a treatment relationship or guarantee an appointment. Care begins after the first assessment and acceptance of a plan." }
        - { heading_ar: "التواصل عبر واتساب", heading_en: "WhatsApp communication",
            body_ar: "حين تتواصلين معنا عبر واتساب، تنطبق شروط واتساب وسياسة خصوصيته إضافةً إلى سياستنا. نتعامل مع محادثاتك بسرّية.",
            body_en: "When you contact us via WhatsApp, WhatsApp's own terms and privacy policy apply in addition to ours. We treat your conversations as confidential." }
    cookies:
      title_ar: "نستخدم ملفات تعريف الارتباط الأساسية لتشغيل الموقع، وملفات اختيارية لفهم الاستخدام."
      title_en: "We use essential cookies to run the site, and optional ones to understand usage."
      accept: "Accept · أوافق"
      decline: "Essential only · الأساسية فقط"
      more: "Privacy · الخصوصية"
  vip:
    eyebrow: "Private Care · العناية الخاصة"
    statement_ar: "العناية الخاصة بالدعوة. إن كنتِ تقرئين هذه الصفحة، فقد تكونين مؤهّلة بالفعل."
    statement_en: "Private Care is by invitation. If you are reading this page, you may already qualify."
    includes_label: "What it includes · ما تتضمّنه"
    includes:
      - { ar: "خط واتساب خاص ومسؤولة علاقات مخصّصة لكِ وحدك.", en: "A private WhatsApp line and a patient relations lead dedicated to you alone." }
      - { ar: "ساعات خاصة وجناح منفصل، وأولوية في المواعيد.", en: "Private hours, a separate suite, and priority scheduling." }
      - { ar: "خارطة طريق شخصية لاثني عشر شهرًا، ومراجعة فصلية للبشرة.", en: "A personalised 12-month roadmap and a quarterly skin review." }
      - { ar: "اتفاقيات سرّية ونماذج موافقة محفوظة في ملفّك.", en: "Confidentiality agreements and consent templates kept on file." }
      - { ar: "باقات للمناسبات الخاصة والأعراس عند الطلب.", en: "Bridal and private-event packages on request." }
      - { ar: "استقبال ومغادرة بسرية، وخدمة ركن سيارة.", en: "Discreet check-in and check-out, with valet pickup." }
      - { ar: "التزام استجابة أقل من ساعتين، من ٩:٠٠ حتى ٢٢:٠٠.", en: "A concierge SLA — under two hours, 09:00–22:00." }
    tiers_label: "Membership · العضوية"
    tiers:
      - { name_ar: "المطّلعة", name_en: "Skin Insider", value: "Ongoing maintenance, quarterly reviews, and priority scheduling." }
      - { name_ar: "المطّلعة بلس", name_en: "Skin Insider+", value: "Everything in Insider, plus a dedicated lead and private hours." }
      - { name_ar: "كونسيرج البشرة", name_en: "Skin Concierge", value: "The full private track — bespoke roadmap, suite access, and event packages." }
    apply_label: "The only way in · المدخل الوحيد"
    apply_title_ar: "طلب انضمام خاص"
    apply_title_en: "A private application"
    apply_button: "Send my application privately"
    fields:
      name: "Your name · الاسم"
      contact: "Contact · وسيلة التواصل"
      referral: "Referred by · بدعوة من"
      note: "A brief note · ملاحظة موجزة"
    discretion_label: "On discretion · عن السرية"
    discretion_ar: "ما يُقال في هذه العيادة، يبقى فيها. لا أسماء، لا صور، لا استثناءات دون موافقتك الصريحة. الخصوصية ليست خدمة نقدّمها — إنها شرطٌ نعمل به."
    discretion_en: "What is said in this clinic stays in it. No names, no images, no exceptions without your explicit consent. Privacy is not a service we offer — it is a condition we work under."
  method:
    eyebrow: "The Maysa Method™ · منهج ميساء"
    statement_ar: "البشرة بيانات. اقرأيها، ثم عالجيها."
    statement_en: "Skin is data. Read it, then treat it."
    principle_label: "The principle · المبدأ"
    principle:
      - "Most clinics begin with a treatment and look for a face to apply it to. The Maysa Method™ begins the other way around. It treats the skin as a system that can be read — measured, mapped, understood — before a single decision is made."
      - "From that reading comes a plan, not a sale. The Method is not a procedure you book; it is the discipline that decides which procedures are worth booking, in what order, over how long. It is the difference between a result that looks done and a result that looks like you."
    pillars_label: "The four pillars · الركائز الأربع"
    pillars_title_ar: "نظام واحد، أربع ركائز"
    pillars_title_en: "One system, four pillars"
    pillars:
      skin:      { title_ar: "البشرة", title_en: "Skin", body: "Texture, tone, barrier and pigmentation — read first, because it shows everything else." }
      hair:      { title_ar: "الشعر", title_en: "Hair", body: "Scalp health and density, treated as part of the whole, not an afterthought." }
      body:      { title_ar: "الجسم", title_en: "Body", body: "Tone, contour and posture — because skin does not end at the jawline." }
      lifestyle: { title_ar: "نمط الحياة", title_en: "Lifestyle", body: "Sleep, sun, stress and habit — the inputs no device can override." }
    pillars_note_ar: "لا تُعالَج أيٌّ منها بمعزل عن الأخرى. هذا هو المنهج."
    pillars_note_en: "None is treated in isolation from the others. That is the method."
    not_label: "What it is not · ما ليس عليه"
    not_items:
      - { ar: "ليس علاجًا واحدًا.", en: "It is not a single treatment." }
      - { ar: "ليس حلًّا سريعًا.", en: "It is not a quick fix." }
      - { ar: "ليس قائمة أسعار.", en: "It is not a price list." }
      - { ar: "ليس وعدًا بنتيجة قبل قراءة بشرتك.", en: "It is not a promise made before your skin is read." }
    timeline_label: "The year · السنة"
    timeline_title_ar: "اثنا عشر شهرًا، مرسومة."
    timeline_title_en: "Twelve months, mapped."
    timeline:
      - { months: "Months 1–3", title_ar: "القراءة والتهيئة", title_en: "Read & prepare", body: "Diagnostic mapping, barrier repair, and the written plan you keep." }
      - { months: "Months 4–6", title_ar: "التأسيس", title_en: "Build the base", body: "Core protocols begin, sequenced so the skin is never overwhelmed." }
      - { months: "Months 7–9", title_ar: "التحسين", title_en: "Refine", body: "We measure against the baseline and adjust what the data asks us to." }
      - { months: "Months 10–12", title_ar: "الحفاظ", title_en: "Hold the result", body: "Maintenance settles in, and the quarterly review becomes a quiet rhythm." }
    stories_label: "In their words · بأصواتهنّ"
    stories:
      - { ar: "للمرة الأولى فهمت لماذا نفعل كل خطوة، لا فقط ماذا نفعل.", en: "For the first time I understood why we did each step — not just what.", by: "A.M. · 2025" }
      - { ar: "الخطة المكتوبة جعلتني أثق. كنت أعرف دائمًا ما يأتي بعد.", en: "The written plan made me trust it. I always knew what came next.", by: "L.S. · 2025" }
      - { ar: "النتيجة لم تبدُ كأنني فعلت شيئًا — بدت كأنني أنا.", en: "The result didn't look like I'd done something — it looked like me.", by: "R.A. · 2024" }
    cta_label: "Begin · ابدئي"
  journal:
    eyebrow: "Journal · المجلّة"
    title_ar: "ملاحظات من العيادة."
    title_en: "Notes from the clinic."
    intro_ar: "ليست مدوّنة، بل مجلّة هادئة — صوت الطبيبة، وما يجري داخل العيادة، وطقوس الموسم."
    intro_en: "Not a blog — a quiet magazine. The doctor's voice, what happens inside the clinic, and the rituals of the season."
    categories:
      - "Dr. Maysa Writes · بقلم د. ميساء"
      - "Inside the Clinic · داخل العيادة"
      - "Ritual · طقوس"
      - "Notes from Patients · من المريضات"
    placeholder_note: "Placeholder articles. Real Journal entries — bilingual, by Dr. Maysa and named contributors — to be published before launch."
    articles:
      - { category: "Dr. Maysa Writes", title_ar: "ما الذي يستحقّ أموالك؟", title_en: "What is worth your money?", byline: "Dr. Maysa", reading_time: "6 min" }
      - { category: "Inside the Clinic", title_ar: "جولة في غرفة الأجهزة", title_en: "A walk through the device room", byline: "NeuSkin", reading_time: "4 min" }
      - { category: "Ritual", title_ar: "العناية بالبشرة في رمضان", title_en: "Skincare through Ramadan", byline: "Dr. Maysa", reading_time: "5 min" }
      - { category: "Dr. Maysa Writes", title_ar: "لماذا أقول لا أحيانًا", title_en: "Why I sometimes say no", byline: "Dr. Maysa", reading_time: "7 min" }
      - { category: "Ritual", title_ar: "توهّج ما قبل العيد", title_en: "The pre-Eid glow", byline: "Dr. Maysa", reading_time: "4 min" }
      - { category: "Inside the Clinic", title_ar: "كيف نقيس النتائج", title_en: "How we measure results", byline: "NeuSkin", reading_time: "5 min" }
  stories:
    eyebrow: "Patient Stories · قصص المريضات"
    title_ar: "بأصواتهنّ، حين يأذنّ."
    title_en: "In their words, when they allow it."
    empty_ar: "لم ننشر قصصًا بعد. حين نفعل، ستكون حقيقية وبموافقة كاملة — لا صورًا من أرشيف، ولا كلامًا منسوبًا لأحد لم يقله."
    empty_en: "We have not published stories yet. When we do, they will be real and fully consented — no stock imagery, no words put in anyone's mouth."
    policy_ar: "كل قصة تبدأ بإذنٍ مكتوب. الصور، إن وُجدت، بإطار موحّد وموافقة منفصلة. ولكِ أن تسحبي إذنك في أي وقت."
    policy_en: "Every story begins with written consent. Photographs, where they exist, use a standardised framing and separate consent — and you may withdraw yours at any time."
    cta_label: "Quietly · بهدوء"
    cta_ar: "أفضل قصة هي قصّتك أنت."
    cta_en: "The best story is your own."
  faq:
    eyebrow: "FAQ · الأسئلة الشائعة"
    title_ar: "الأسئلة التي تسبق القرار."
    title_en: "The questions that come before a decision."
    search_ph: "Search the questions… · ابحثي في الأسئلة"
    no_results: "No question matches that. Send it to us privately and Dr. Maysa will answer."
    cta_label: "Still wondering? · ما زال لديك سؤال؟"
    cta_ar: "سؤال لم نُجب عنه؟ اسألينا بسرية."
    cta_en: "A question we didn't answer? Ask us privately."
    groups:
      clinic:
        title_ar: "عن العيادة"
        title_en: "About the clinic"
        items:
          - { q_ar: "أين تقع العيادة وما ساعات العمل؟", q_en: "Where are you, and what are your hours?", a_ar: "نحن في حي الملقا بالرياض. نعمل من السبت إلى الخميس، ١٠:٠٠–٢٢:٠٠، والجمعة مغلق.", a_en: "We're in Al Malqa, Riyadh, open Saturday to Thursday, 10:00–22:00, closed Friday." }
          - { q_ar: "كيف أبدأ؟", q_en: "How do I begin?", a_ar: "برسالة واتساب خاصة أو نموذج الاستفسار. تراجعه مسؤولة علاقات المريضات وتعاودين التواصل خلال ساعتين في أوقات العمل.", a_en: "With a private WhatsApp message or the inquiry form. Our patient relations lead reviews it and replies within two hours during business hours." }
          - { q_ar: "من سيعالجني؟", q_en: "Who will treat me?", a_ar: "تقود د. ميساء كل خطة وتُجري التقييم الأول بنفسها. ينفّذ الجلسات فريق طبي مرخّص تحت إشرافها.", a_en: "Dr. Maysa leads every plan and conducts the first assessment personally. A licensed medical team carries out sessions under her supervision." }
          - { q_ar: "هل أحتاج موعدًا مسبقًا؟", q_en: "Do I need an appointment?", a_ar: "نعم، نعمل بالمواعيد فقط حفاظًا على الخصوصية والهدوء. لا زيارات دون ترتيب مسبق.", a_en: "Yes — we work by appointment only, to keep things private and unhurried. No walk-ins." }
          - { q_ar: "ماذا أتوقّع في زيارتي الأولى؟", q_en: "What should I expect on my first visit?", a_ar: "تقييم تشخيصي لمدة ٦٠ دقيقة، دون أي علاج. نقرأ بشرتك ونضع خطة مكتوبة تحتفظين بها.", a_en: "A 60-minute diagnostic assessment, with no treatment performed. We read your skin and write a plan you keep." }
      treatments:
        title_ar: "عن العلاجات"
        title_en: "About treatments"
        items:
          - { q_ar: "هل العلاجات مؤلمة؟", q_en: "Are treatments painful?", a_ar: "معظمها لطيف. حين يلزم، نستخدم مخدّرًا موضعيًا، ونشرح لك الإحساس المتوقّع قبل البدء.", a_en: "Most are gentle. Where needed, we use topical numbing and explain the sensation to expect before we begin." }
          - { q_ar: "كم تبلغ فترة التعافي؟", q_en: "How much downtime is there?", a_ar: "تختلف حسب الإجراء — من لا شيء إلى بضعة أيام. نخطّط الجلسات حول جدولك ونخبرك مسبقًا.", a_en: "It varies by procedure — from none to a few days. We sequence sessions around your schedule and tell you in advance." }
          - { q_ar: "متى أرى النتائج؟", q_en: "When will I see results?", a_ar: "بعض النتائج تظهر خلال أسابيع، وبعضها يحتاج دورة كاملة. نوثّق التقدّم كل ثلاثة أشهر لئلّا نخمّن.", a_en: "Some results show within weeks; others need a full cycle. We document progress quarterly so we're never guessing." }
          - { q_ar: "هل العلاجات آمنة؟", q_en: "Are the treatments safe?", a_ar: "نستخدم أجهزة ومنتجات مرخّصة فقط، وكل خطة تُبنى على تقييم طبي فردي. السلامة تسبق كل شيء.", a_en: "We use only licensed devices and products, and every plan is built on an individual medical assessment. Safety comes first." }
          - { q_ar: "كيف أعرف ما يناسبني؟", q_en: "How do I know what's right for me?", a_ar: "لا تختارين من قائمة. التقييم يحدّد ما تحتاجه بشرتك فعلًا، وأحيانًا يكون الجواب: انتظري.", a_en: "You don't choose from a menu. The assessment determines what your skin actually needs — and sometimes the answer is: wait." }
      protocols:
        title_ar: "عن البروتوكولات"
        title_en: "About protocols"
        items:
          - { q_ar: "كيف تعمل البروتوكولات؟", q_en: "How do protocols work?", a_ar: "كل بروتوكول خطة متسلسلة لمدّة محدّدة، لا إجراءً منفردًا. نعالج بالترتيب ونراجع كل ثلاثة أشهر.", a_en: "Each protocol is a sequenced plan over a set period, not a single procedure. We treat in order and review quarterly." }
          - { q_ar: "هل يمكنني تغيير البروتوكول؟", q_en: "Can I switch protocols?", a_ar: "نعم. تستجيب الخطة لبشرتك؛ إن تغيّرت احتياجاتك، نعدّلها مع د. ميساء.", a_en: "Yes. The plan responds to your skin; if your needs change, we adjust it with Dr. Maysa." }
          - { q_ar: "ماذا لو لم أرَ نتائج؟", q_en: "What if I don't see results?", a_ar: "لأننا نقيس كل ثلاثة أشهر، نلاحظ مبكرًا ونعدّل. النتائج موثّقة، لا موعودة.", a_en: "Because we measure quarterly, we notice early and adjust. Results are documented, not promised." }
          - { q_ar: "من يقرّر الخطة؟", q_en: "Who decides the plan?", a_ar: "د. ميساء، بناءً على تشخيصك ومع موافقتك. لا شيء يُجرى دون أن تفهميه وتختاريه.", a_en: "Dr. Maysa, based on your diagnosis and with your consent. Nothing happens without your understanding and choice." }
          - { q_ar: "هل أحتاج عضوية للبدء؟", q_en: "Do I need a membership to begin?", a_ar: "لا. يبدأ الجميع بتقييم منهج ميساء. العضوية للعناية المستمرة بعد إكمال بروتوكول.", a_en: "No. Everyone begins with the Maysa Method™ assessment. Membership is for ongoing maintenance after a protocol." }
      privacy:
        title_ar: "عن الخصوصية"
        title_en: "About privacy"
        items:
          - { q_ar: "هل بياناتي سرّية؟", q_en: "Is my information confidential?", a_ar: "تمامًا. لا يُطّلع على ملفّك إلا من يعالجك، ونلتزم بنظام حماية البيانات الشخصية.", a_en: "Completely. Only those treating you see your file, and we comply with the Personal Data Protection Law." }
          - { q_ar: "هل تلتقطون صورًا؟", q_en: "Do you take photographs?", a_ar: "فقط بموافقتك المكتوبة، وبإطار تصوير موحّد. لكِ أن ترفضي دون أن يؤثّر ذلك على علاجك.", a_en: "Only with your written consent, under a standardised framing. You may decline with no effect on your care." }
          - { q_ar: "هل تنشرون نتائجي على وسائل التواصل؟", q_en: "Will you post my results on social media?", a_ar: "أبدًا دون موافقة منفصلة وصريحة. الصمت هو الوضع الافتراضي، لا النشر.", a_en: "Never without separate, explicit consent. Silence is the default — not sharing." }
          - { q_ar: "هل يمكنني سحب موافقتي لاحقًا؟", q_en: "Can I withdraw my consent later?", a_ar: "في أي وقت. أبلغينا وسنوقف أي استخدام لصورك أو قصّتك فورًا.", a_en: "At any time. Tell us and we stop any use of your images or story immediately." }
          - { q_ar: "هل تتعاملون مع شخصيات عامة بسرية أكبر؟", q_en: "Do you offer extra discretion for public figures?", a_ar: "نعم، عبر مسار العناية الخاصة — خط مباشر، ساعات خاصة، واتفاقيات سرّية عند الحاجة.", a_en: "Yes, through Private Care — a direct line, private hours, and confidentiality agreements where needed." }
  clinic:
    hero_ar: "عيادة خاصة في الملقا، بُنيت حول سؤال واحد: كيف ستبدو بشرتك بعد خمس سنوات؟"
    hero_en: "A private clinic in Al Malqa, built around one question: what will your skin look like in five years?"
    story_label: "The story · القصة"
    story:
      - "We did not set out to open another aesthetics clinic. Riyadh has many. We set out to answer a question most clinics never ask: not what would you like done today, but where do you want your skin to be in five years?"
      - "NeuSkin began with that question and a conviction — that skin is not a series of fixes, but a system worth reading before it is treated. So we built a clinic around the reading. A doctor leads every plan. Nothing is sold from a menu. Outcomes are measured, not promised."
      - "We chose Al Malqa for its quiet. We kept the rooms few and the hours unhurried. We treat fewer patients, more carefully — because the work we believe in cannot be done at volume. This is a clinic for the woman who wants results that look like her, arrived at slowly, and kept private."
    space_label: "The space · المكان"
    space_rooms:
      - "The entrance · المدخل"
      - "Private waiting lounge · صالة الانتظار الخاصة"
      - "Consultation room · غرفة الاستشارة"
      - "Treatment room · غرفة العلاج"
      - "Device room · غرفة الأجهزة"
      - "The private suite · الجناح الخاص"
    standard_label: "The standard · المعايير"
    standard:
      - { ar: "تعمل العيادة بترخيص الهيئة العامة للغذاء والدواء ووزارة الصحة، وأرقام التراخيص ظاهرة في تذييل كل صفحة.", en: "The clinic operates under SFDA and MOH licences, with licence numbers visible in the footer of every page." }
      - { ar: "يحمل كل ممارس ترخيصًا مهنيًا ساريًا ضمن مجال تخصّصه.", en: "Every practitioner holds a current professional licence within their scope of practice." }
      - { ar: "خصوصيتك محمية وفق نظام حماية البيانات الشخصية. لا يُطّلع على ملفّك إلا من يعالجك.", en: "Your privacy is protected under the Personal Data Protection Law. Only those treating you see your file." }
      - { ar: "لا نلتقط أي صورة دون موافقتك المكتوبة، وبإطار تصوير موحّد.", en: "We take no photograph without your written consent, under a standardised framing." }
      - { ar: "النتائج تختلف من شخص لآخر. هذا ليس بندًا قانونيًا — إنه صدقٌ نبدأ به كل خطة.", en: "Results vary from person to person. This isn't fine print — it's the honesty we begin every plan with." }
