    outcomes:
      - { o: "Tired, dull skin", how: "Barrier repair, gentle resurfacing and measured glow work — sequenced over weeks, not forced in one session.", owns: "90-Day Glow Reset", view: "90-day-glow-reset", maysa: "Tired skin is usually over-treated skin. We often do less, and it does more." }
