services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: tba_development
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    restart: always
    ports:
      - "6379:6379"

  app:
    build: .
    restart: always
    # Run as the host user so bind-mounted files (Gemfile.lock, db, tmp, log)
    # stay writable in development. Matches the host uid:gid.
    user: "1001:1001"
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgres://postgres:password@db:5432/tba_development
      REDIS_URL: redis://redis:6379/0
      RAILS_ENV: development
    volumes:
      - .:/rails
      - storage:/rails/storage
    ports:
      - "3000:3000"
    command: ["bin/rails", "server", "-b", "0.0.0.0", "-p", "3000"]

  sidekiq:
    build: .
    restart: always
    user: "1001:1001"
    depends_on:
      - redis
      - db
    environment:
      DATABASE_URL: postgres://postgres:password@db:5432/tba_development
      REDIS_URL: redis://redis:6379/0
      RAILS_ENV: development
    volumes:
      - .:/rails
      - storage:/rails/storage
    command: ["bundle", "exec", "sidekiq", "-r", "./config/environment.rb"]

volumes:
  postgres_data:
  storage:

