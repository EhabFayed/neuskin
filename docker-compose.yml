services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: app_production
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    image: neuskin_image:latest
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      RAILS_ENV: production
      DATABASE_URL: postgres://postgres:password@db:5432/app_production
      REDIS_URL: redis://redis:6379/0
      RAILS_LOG_TO_STDOUT: "true"
      RAILS_SERVE_STATIC_FILES: "true"
      RAILS_HOST: neuskin.me
      RAILS_PROTOCOL: https
      RAILS_ASSUME_SSL: "false"
      RAILS_FORCE_SSL: "false"
      PORT: "9020"
      # Secret key base for Rails production (generate with: openssl rand -hex 64)
      SECRET_KEY_BASE: "ff160b8e556ca88ab8d57231e91046b0b863bc33096ab32df6e0229f6c201785ead74e42eb1b1a8ec479c7f3ae1d3100e6b15bb1b260857df1f0fc8719dcd5b6"
    ports:
      - "9020:9020"  # Map host port 9020 to container port 9020
    volumes:
      - storage:/rails/storage
    command: ["bash", "-c", "rm -f tmp/pids/server.pid && bin/rails server -b 0.0.0.0 -p ${PORT:-9020}"]
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -f http://localhost:${PORT:-9020}/up || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  sidekiq:
    image: neuskin_image:latest
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      RAILS_ENV: production
      DATABASE_URL: postgres://postgres:password@db:5432/app_production
      REDIS_URL: redis://redis:6379/0
      RAILS_LOG_TO_STDOUT: "true"
      SECRET_KEY_BASE: "ff160b8e556ca88ab8d57231e91046b0b863bc33096ab32df6e0229f6c201785ead74e42eb1b1a8ec479c7f3ae1d3100e6b15bb1b260857df1f0fc8719dcd5b6"
    volumes:
      - storage:/rails/storage
    command: ["bundle", "exec", "sidekiq"]

volumes:
  postgres_data:
  storage:
